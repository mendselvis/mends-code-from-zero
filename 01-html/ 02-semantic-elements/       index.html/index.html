<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Elements</title>
  </head>
  <body>

    <!-- Header — sits at the top of the page, holds the logo and nav -->
    <header>
      <h1>Mends Elvis</h1>
      <p>Full Stack Web Developer</p>
    </header>

    <!-- Nav — holds navigation links -->
    <nav>
      <a href="#about">About</a>
      <a href="#work">Work</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- Main — the primary content of the page -->
    <main>

      <!-- Section — a thematic grouping of content -->
      <section id="about">
        <h2>About</h2>
        <p>I build clean, functional web applications from frontend to backend.</p>
      </section>

      <!-- Article — self-contained content, like a blog post or card -->
      <article>
        <h3>Why I Code</h3>
        <p>Building for the web means building for everyone. That is why I do it.</p>
      </article>

      <!-- Aside — secondary content, related to the main content -->
      <aside>
        <p>Currently learning — React, Next.js, PostgreSQL</p>
      </aside>

    </main>

    <!-- Footer — sits at the bottom, holds copyright or links -->
    <footer>
      <p>Mends Elvis &copy; 2026</p>
    </footer>

  </body>
</html>
