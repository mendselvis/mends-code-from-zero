<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>
  <body>

    <!-- Basic table structure -->
    <table>

      <!-- Table header -->
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Location</th>
          <th>Status</th>
        </tr>
      </thead>

      <!-- Table body -->
      <tbody>
        <tr>
          <td>James Carter</td>
          <td>Frontend Developer</td>
          <td>London</td>
          <td>Active</td>
        </tr>
        <tr>
          <td>Sara Mensah</td>
          <td>Backend Developer</td>
          <td>Accra</td>
          <td>Active</td>
        </tr>
        <tr>
          <td>David Osei</td>
          <td>Full Stack Developer</td>
          <td>Berlin</td>
          <td>Inactive</td>
        </tr>
        <tr>
          <td>Nina Patel</td>
          <td>UI Engineer</td>
          <td>Toronto</td>
          <td>Active</td>
        </tr>
      </tbody>

      <!-- Table footer -->
      <tfoot>
        <tr>
          <td colspan="4">Total: 4 developers</td>
        </tr>
      </tfoot>

    </table>

  </body>
</html>
