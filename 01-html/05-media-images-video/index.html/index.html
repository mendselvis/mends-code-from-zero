<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media — Images and Video</title>
  </head>
  <body>

    <!-- Basic image -->
    <img src="https://picsum.photos/600/400" alt="A random image" />

    <!-- Image with width and height -->
    <img src="https://picsum.photos/300/200" alt="A smaller image" width="300" height="200" />

    <!-- Figure with caption -->
    <figure>
      <img src="https://picsum.photos/500/300" alt="A featured image" />
      <figcaption>A sample image with a caption below it.</figcaption>
    </figure>

    <!-- Video with controls -->
    <video width="600" controls>
      <source src="sample.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Video with autoplay and muted -->
    <video width="600" autoplay muted loop>
      <source src="sample.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Audio -->
    <audio controls>
      <source src="sample.mp3" type="audio/mpeg" />
      Your browser does not support the audio tag.
    </audio>

    <!-- Iframe — embedding external content -->
    <iframe
      width="600"
      height="400"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      title="Sample video"
      allowfullscreen>
    </iframe>

  </body>
</html>
