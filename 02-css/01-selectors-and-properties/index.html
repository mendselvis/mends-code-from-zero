<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectors and Properties</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Element selector target -->
    <h1>CSS Selectors and Properties</h1>

    <!-- Class selector target -->
    <p class="intro">This paragraph uses a class selector.</p>

    <!-- ID selector target -->
    <p id="highlight">This paragraph uses an ID selector.</p>

    <!-- Grouped selectors -->
    <h2>Grouped Heading</h2>
    <h3>Another Grouped Heading</h3>

    <!-- Descendant selector -->
    <div class="card">
      <p>This paragraph is inside a card div.</p>
    </div>

    <!-- Pseudo-class selector -->
    <a href="#">Hover over this link</a>

    <!-- Pseudo-element selector -->
    <p class="decorated">This paragraph has a decorative first letter.</p>

  </body>
</html>
