<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors and Backgrounds</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Colors and Backgrounds</h1>

    <!-- Color formats -->
    <section>
      <h2>Color Formats</h2>
      <div class="color-grid">
        <div class="swatch hex"><p>Hex</p></div>
        <div class="swatch rgb"><p>RGB</p></div>
        <div class="swatch rgba"><p>RGBA</p></div>
        <div class="swatch hsl"><p>HSL</p></div>
      </div>
    </section>

    <!-- CSS variables -->
    <section>
      <h2>CSS Variables</h2>
      <div class="color-grid">
        <div class="swatch primary"><p>Primary</p></div>
        <div class="swatch secondary"><p>Secondary</p></div>
        <div class="swatch accent"><p>Accent</p></div>
      </div>
    </section>

    <!-- Background color -->
    <section>
      <h2>Background Color</h2>
      <div class="bg-solid">
        <p>Solid background color</p>
      </div>
    </section>

    <!-- Background gradient -->
    <section>
      <h2>Background Gradient</h2>
      <div class="bg-linear"><p>Linear gradient</p></div>
      <div class="bg-radial"><p>Radial gradient</p></div>
    </section>

    <!-- Background image -->
    <section>
      <h2>Background Image</h2>
      <div class="bg-image">
        <p>Background image with overlay</p>
      </div>
    </section>

    <!-- Opacity and transparency -->
    <section>
      <h2>Opacity and Transparency</h2>
      <div class="color-grid">
        <div class="swatch opacity-100"><p>100%</p></div>
        <div class="swatch opacity-75"><p>75%</p></div>
        <div class="swatch opacity-50"><p>50%</p></div>
        <div class="swatch opacity-25"><p>25%</p></div>
      </div>
    </section>

  </body>
</html>
