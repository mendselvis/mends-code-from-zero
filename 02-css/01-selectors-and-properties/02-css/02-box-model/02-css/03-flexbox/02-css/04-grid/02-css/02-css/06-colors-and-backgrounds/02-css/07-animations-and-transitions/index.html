<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animations and Transitions</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Animations and Transitions</h1>

    <!-- Transitions -->
    <section>
      <h2>Transitions</h2>
      <button class="btn-transition">Hover me</button>
      <div class="box-transition">Hover me</div>
    </section>

    <!-- Transform -->
    <section>
      <h2>Transform</h2>
      <div class="transform-grid">
        <div class="box transform-scale">Scale</div>
        <div class="box transform-rotate">Rotate</div>
        <div class="box transform-translate">Translate</div>
        <div class="box transform-skew">Skew</div>
      </div>
    </section>

    <!-- Keyframe animations -->
    <section>
      <h2>Keyframe Animations</h2>
      <div class="box animate-fade">Fade in</div>
      <div class="box animate-slide">Slide in</div>
      <div class="box animate-bounce">Bounce</div>
      <div class="box animate-pulse">Pulse</div>
    </section>

  </body>
</html>
