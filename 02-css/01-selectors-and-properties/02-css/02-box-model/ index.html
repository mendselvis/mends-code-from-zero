<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>The CSS Box Model</h1>

    <!-- Content only -->
    <div class="box content-only">
      <p>Content only</p>
    </div>

    <!-- Content with padding -->
    <div class="box with-padding">
      <p>Content with padding</p>
    </div>

    <!-- Content with padding and border -->
    <div class="box with-border">
      <p>Content with padding and border</p>
    </div>

    <!-- Content with padding, border and margin -->
    <div class="box with-margin">
      <p>Content with padding, border and margin</p>
    </div>

    <!-- Box sizing demonstration -->
    <div class="box box-border">
      <p>Box sizing border-box</p>
    </div>

  </body>
</html>
